name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter --version
      - run: flutter pub get

      # base-href MUST match the repo name (served at /<repo>/).
      # Keys are injected from repository secrets via --dart-define, so they
      # never live in the committed source.
      - name: Build web
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          FLW_PUBLIC_KEY: ${{ secrets.FLW_PUBLIC_KEY }}
        run: |
          # Only override a value when its secret is actually set; otherwise
          # the default baked into app_config.dart is used. This prevents an
          # empty secret from blanking out the key and tripping the
          # "Add your Supabase keys" screen.
          DEFINES=""
          [ -n "$SUPABASE_URL" ] && DEFINES="$DEFINES --dart-define=SUPABASE_URL=$SUPABASE_URL"
          [ -n "$SUPABASE_ANON_KEY" ] && DEFINES="$DEFINES --dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY"
          [ -n "$FLW_PUBLIC_KEY" ] && DEFINES="$DEFINES --dart-define=FLW_PUBLIC_KEY=$FLW_PUBLIC_KEY"
          echo "Building with base-href /match_space/"
          flutter build web --release --base-href="/match_space/" $DEFINES

      # Prevent Jekyll from stripping Flutter's _flutter assets folder.
      - run: touch build/web/.nojekyll

      # SPA fallback (harmless with hash routing, useful if you switch later).
      - run: cp build/web/index.html build/web/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
